{% extends "base_booking.html" %}
{% block title %}Your Details{% endblock %}

{% block content %}
<p><a href="/book/datetime?service_id={{ service.id }}&staff_id={{ staff.id }}">&larr; Back to times</a></p>
<h2>Your details</h2>
<p style="color: var(--pico-muted-color);">
  {{ service.name }} with <strong>{{ staff.full_name }}</strong> &mdash; {{ slot_display }}
</p>

<form method="post" action="/book/confirm">
  <input type="hidden" name="service_id" value="{{ service.id }}">
  <input type="hidden" name="staff_id" value="{{ staff.id }}">
  <input type="hidden" name="slot" value="{{ slot }}">

  <label for="client_name">Full name</label>
  <input type="text" id="client_name" name="client_name" required autofocus
         placeholder="Jane Smith">

  <label for="client_phone">Phone number</label>
  <input type="tel" id="client_phone" name="client_phone" required
         placeholder="+55 11 99999-0000">

  <label for="client_email">Email address</label>
  <input type="email" id="client_email" name="client_email" required
         placeholder="jane@example.com">

  <button type="submit" style="width: 100%; margin-top: 0.5rem;">
    Confirm booking
  </button>
</form>
{% endblock %}
