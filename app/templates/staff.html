<!-- app/templates/staff.html -->
{% extends "base.html" %}
{% block title %}Staff{% endblock %}

{% block content %}
<h2>Staff</h2>

<!-- Add staff form -->
<article>
  <h4>Add Staff Member</h4>
  <form hx-post="/admin/staff"
        hx-target="#staff-table"
        hx-swap="afterbegin"
        hx-on::after-request="this.reset()">
    <div class="grid">
      <input type="text" name="full_name" placeholder="Full name" required>
      <input type="text" name="role" placeholder="Role (e.g. Colorist)">
      <input type="text" name="phone" placeholder="Phone">
      <select name="location_id" required>
        {% for loc in locations %}
        <option value="{{ loc.id }}">{{ loc.name }}</option>
        {% endfor %}
      </select>
    </div>
    <button type="submit">Add</button>
  </form>
</article>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Role</th>
      <th>Location</th>
      <th>Phone</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="staff-table">
    {% for member in staff %}
    {% include "_staff_row.html" %}
    {% endfor %}
  </tbody>
</table>
{% endblock %}
