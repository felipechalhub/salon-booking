<!-- app/templates/services.html -->
{% extends "base.html" %}
{% block title %}Services{% endblock %}

{% block content %}
<h2>Services</h2>

<article>
  <h4>Add Service</h4>
  <form hx-post="/admin/services"
        hx-target="#services-table"
        hx-swap="afterbegin"
        hx-on::after-request="this.reset()">
    <div class="grid">
      <input type="text" name="name" placeholder="Service name" required>
      <input type="number" name="duration_minutes" placeholder="Duration (min)" required>
      <input type="number" name="buffer_minutes" placeholder="Buffer (min)" value="15">
      <input type="number" name="price" placeholder="Price (e.g. 60.00)" step="0.01" min="0">
      <select name="location_id" required>
        {% for loc in locations %}
        <option value="{{ loc.id }}">{{ loc.name }}</option>
        {% endfor %}
      </select>
    </div>
    <button type="submit">Add</button>
  </form>
</article>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Duration</th>
      <th>Buffer</th>
      <th>Price</th>
      <th>Location</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="services-table">
    {% for svc in services if svc.is_active %}
    {% include "_service_row.html" %}
    {% endfor %}
  </tbody>
</table>
{% endblock %}
